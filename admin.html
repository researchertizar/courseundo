<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courseundo — Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">
</head>

<body>

    <div id="login-wrapper" class="admin-login-wrapper">
        <div class="admin-login-card">
            <h1>Course<span>undo</span></h1>
            <p class="login-subtitle">Admin Dashboard</p>
            <div id="login-error" class="login-error"></div>
            <form id="login-form" autocomplete="off">
                <div class="form-group" style="margin-bottom:0.75rem">
                    <label class="form-label" for="login-email">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="admin@example.com" required>
                </div>
                <div class="form-group" style="margin-bottom:0.75rem">
                    <label class="form-label" for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
            </form>
        </div>
    </div>

    <div id="dashboard-wrapper" class="admin-wrapper hidden">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-brand">Course<span>undo</span></div>
            <nav class="admin-nav" id="admin-nav">
                <button type="button" class="admin-nav-item active" data-tab="courses">&#128218;
                    <span>Courses</span></button>
                <button type="button" class="admin-nav-item" data-tab="bulk">&#128229; <span>Bulk Ops</span></button>
                <button type="button" class="admin-nav-item" data-tab="suggestions">&#9993;
                    <span>Suggestions</span><span id="suggestion-badge" class="badge hidden">0</span></button>
                <button type="button" class="admin-nav-item" data-tab="ratings">&#11088; <span>Ratings</span></button>
                <button type="button" class="admin-nav-item" data-tab="logs">&#128203; <span>Logs</span></button>
                <button type="button" class="admin-nav-item" data-tab="analytics">&#128202;
                    <span>Analytics</span></button>
            </nav>
            <div style="padding:0.5rem;margin-top:auto;border-top:1px solid var(--border);padding-top:0.75rem">
                <button type="button" id="logout-btn" class="btn btn-secondary btn-sm" style="width:100%">Sign
                    Out</button>
            </div>
        </aside>

        <main class="admin-main">

            <!-- COURSES -->
            <div id="tab-courses" class="admin-tab-panel active">
                <h2 class="admin-page-title">Courses</h2>
                <div style="display:flex;gap:0.75rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap">
                    <input type="text" id="course-search" class="form-input" placeholder="Search..."
                        style="max-width:280px;padding:0.45rem 0.7rem;font-size:0.8rem">
                    <label
                        style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);display:flex;align-items:center;gap:0.3rem;cursor:pointer">
                        <input type="checkbox" id="show-archived"> Archived
                    </label>
                    <button type="button" id="new-course-btn" class="btn btn-secondary btn-sm"
                        style="margin-left:auto">+ New</button>
                </div>
                <div id="admin-course-list" class="admin-course-list"></div>
                <h3 id="course-form-title"
                    style="font-family:var(--font-display);font-size:1.2rem;font-weight:400;margin:1.25rem 0 0.75rem;color:var(--text-primary)">
                    Add New Course</h3>
                <p id="course-field-status"
                    style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);margin-bottom:0.75rem">
                </p>
                <form id="course-form" autocomplete="off">
                    <div class="admin-form-grid">
                        <div class="form-group full-width">
                            <label class="form-label" for="course-title">Title <span class="required">*</span></label>
                            <input type="text" id="course-title" class="form-input" placeholder="Course title" required
                                minlength="5" maxlength="200">
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label" for="course-link">Link <span class="required">*</span></label>
                            <div style="display:flex;gap:0.4rem;flex-wrap:wrap">
                                <input type="url" id="course-link" class="form-input" placeholder="https://..." required
                                    style="flex:1;min-width:200px">
                                <button type="button" id="fetch-meta-btn" class="btn btn-secondary btn-sm">Fetch
                                    Metadata</button>
                                <button type="button" id="ai-classify-btn" class="btn btn-secondary btn-sm">AI
                                    Classify</button>
                            </div>
                        </div>
                        <div class="form-group"><label class="form-label" for="course-platform">Platform</label><input
                                type="text" id="course-platform" class="form-input" list="dl-platform"
                                placeholder="Coursera..."><datalist id="dl-platform">
                                <option value="Coursera">
                                <option value="edX">
                                <option value="Udemy">
                                <option value="Khan Academy">
                                <option value="Other">
                            </datalist></div>
                        <div class="form-group"><label class="form-label" for="course-category">Category</label><input
                                type="text" id="course-category" class="form-input" list="dl-cat"
                                placeholder="Programming..."><datalist id="dl-cat">
                                <option value="Programming">
                                <option value="Data Science">
                                <option value="AI/ML">
                                <option value="Business">
                                <option value="Other">
                            </datalist></div>
                        <div class="form-group"><label class="form-label"
                                for="course-institution">Institution</label><input type="text" id="course-institution"
                                class="form-input" placeholder="University/company"></div>
                        <div class="form-group"><label class="form-label"
                                for="course-instructor">Instructor</label><input type="text" id="course-instructor"
                                class="form-input" placeholder="Name(s)"></div>
                        <div class="form-group"><label class="form-label"
                                for="course-difficulty">Difficulty</label><select id="course-difficulty"
                                class="form-input">
                                <option value="">—</option>
                                <option value="Beginner">Beginner</option>
                                <option value="Intermediate">Intermediate</option>
                                <option value="Advanced">Advanced</option>
                            </select></div>
                        <div class="form-group"><label class="form-label" for="course-duration">Duration</label><input
                                type="text" id="course-duration" class="form-input" placeholder="30 hours, 6 weeks">
                        </div>
                        <div class="form-group"><label class="form-label" for="course-mode">Mode</label><input
                                type="text" id="course-mode" class="form-input" list="dl-mode"
                                placeholder="Self-paced..."><datalist id="dl-mode">
                                <option value="Self-paced">
                                <option value="Instructor-led">
                            </datalist></div>
                        <div class="form-group"><label class="form-label" for="course-format">Format</label><input
                                type="text" id="course-format" class="form-input" list="dl-fmt"
                                placeholder="Video..."><datalist id="dl-fmt">
                                <option value="Video">
                                <option value="Text">
                                <option value="Interactive">
                                <option value="Mixed">
                            </datalist></div>
                        <div class="form-group"><label class="form-label" for="course-cost">Cost</label><select
                                id="course-cost" class="form-input">
                                <option value="">—</option>
                                <option value="Free">Free</option>
                                <option value="Paid">Paid</option>
                                <option value="Subscription">Subscription</option>
                                <option value="Freemium">Freemium</option>
                            </select></div>
                        <div class="form-group"><label class="form-label"
                                for="course-certification">Certification</label><select id="course-certification"
                                class="form-input">
                                <option value="">—</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select></div>
                        <div class="form-group"><label class="form-label" for="course-cert-type">Cert Type</label><input
                                type="text" id="course-cert-type" class="form-input"
                                placeholder="Free, Paid, Verified..."></div>
                        <div class="form-group"><label class="form-label"
                                for="course-validation">Validation</label><input type="text" id="course-validation"
                                class="form-input" placeholder="Accredited..."></div>
                        <div class="form-group"><label class="form-label" for="course-job-available">Jobs</label><select
                                id="course-job-available" class="form-input">
                                <option value="">—</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select></div>
                        <div class="form-group"><label class="form-label" for="course-job-country">Job
                                Country</label><input type="text" id="course-job-country" class="form-input"
                                placeholder="USA, Remote..."></div>
                        <div class="form-group"><label class="form-label" for="course-job-salary">Salary</label><input
                                type="text" id="course-job-salary" class="form-input" placeholder="60k-$90k"></div>
                        <div class="form-group"><label class="form-label" for="course-job-mode">Job Mode</label><input
                                type="text" id="course-job-mode" class="form-input" list="dl-jm"
                                placeholder="Remote..."><datalist id="dl-jm">
                                <option value="Remote">
                                <option value="On-site">
                                <option value="Hybrid">
                            </datalist></div>
                        <div class="form-group"><label class="form-label" for="course-language">Language</label><input
                                type="text" id="course-language" class="form-input" list="dl-lang"
                                placeholder="English..."><datalist id="dl-lang">
                                <option value="English">
                                <option value="Spanish">
                                <option value="French">
                                <option value="Hindi">
                                <option value="Chinese">
                            </datalist></div>
                        <div class="form-group full-width">
                            <label class="form-label" for="course-extra-fields">Extra Fields (JSON)</label>
                            <textarea id="course-extra-fields" class="form-input json-input"
                                placeholder='{"prerequisite":"Basic Python"}'></textarea>
                            <span id="json-feedback" class="form-hint"></span>
                        </div>
                    </div>
                    <div class="form-actions-bar">
                        <button type="submit" class="btn btn-primary">Save Course</button>
                        <button type="button" id="archive-course-btn" class="btn btn-danger hidden">Archive</button>
                        <button type="button" id="verify-course-btn" class="btn hidden">Mark Verified</button>
                    </div>
                </form>
            </div>

            <!-- BULK -->
            <div id="tab-bulk" class="admin-tab-panel">
                <h2 class="admin-page-title">Bulk Operations</h2>
                <h3 style="font-family:var(--font-display);font-size:1.1rem;font-weight:400;margin-bottom:0.75rem">
                    Import</h3>
                <div id="file-drop-zone" class="file-drop-zone">
                    <p>Drop CSV or JSON here, or click to browse</p>
                    <p class="file-types">.csv (title, link, ...) or .json (array)</p>
                    <input type="file" id="file-input" accept=".csv,.json" style="display:none">
                </div>
                <div id="import-preview" class="import-preview"></div>
                <div id="import-summary" class="import-summary"></div>
                <button type="button" id="import-btn" class="btn btn-primary mt-2 hidden">Import Valid Rows</button>
                <h3 style="font-family:var(--font-display);font-size:1.1rem;font-weight:400;margin:1.5rem 0 0.75rem">
                    Export</h3>
                <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
                    <button type="button" id="export-csv-btn" class="btn btn-secondary">Export CSV</button>
                    <button type="button" id="export-json-btn" class="btn btn-secondary">Export JSON</button>
                </div>
            </div>

            <!-- SUGGESTIONS -->
            <div id="tab-suggestions" class="admin-tab-panel">
                <h2 class="admin-page-title">Suggestions</h2>
                <div id="admin-suggestions-list"></div>
            </div>

            <!-- RATINGS -->
            <div id="tab-ratings" class="admin-tab-panel">
                <h2 class="admin-page-title">Ratings</h2>
                <div id="ratings-container"></div>
            </div>

            <!-- LOGS -->
            <div id="tab-logs" class="admin-tab-panel">
                <h2 class="admin-page-title">Activity Log</h2>
                <div class="log-filter-bar">
                    <div class="filter-group"><label class="filter-label" for="log-filter-action">Action</label><select
                            id="log-filter-action" class="filter-select">
                            <option value="">All</option>
                            <option value="search">Search</option>
                            <option value="course_click">Click</option>
                            <option value="suggestion">Suggestion</option>
                            <option value="rating">Rating</option>
                            <option value="page_visit">Visit</option>
                        </select></div>
                    <div class="filter-group"><label class="filter-label" for="log-filter-from">From</label><input
                            type="date" id="log-filter-from" class="form-input"
                            style="padding:0.4rem;font-size:0.75rem"></div>
                    <div class="filter-group"><label class="filter-label" for="log-filter-device">Device</label><select
                            id="log-filter-device" class="filter-select">
                            <option value="">All</option>
                            <option value="Desktop">Desktop</option>
                            <option value="Mobile">Mobile</option>
                        </select></div>
                    <button type="button" id="log-apply-filter" class="btn btn-secondary btn-sm">Apply</button>
                    <button type="button" id="log-export-btn" class="btn btn-secondary btn-sm">Export CSV</button>
                </div>
                <div class="log-table-wrapper">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Action</th>
                                <th>Details</th>
                                <th>IP</th>
                                <th>Device</th>
                                <th>Browser</th>
                                <th>OS</th>
                            </tr>
                        </thead>
                        <tbody id="log-table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- ANALYTICS -->
            <div id="tab-analytics" class="admin-tab-panel">
                <h2 class="admin-page-title">Analytics</h2>
                <div id="analytics-container"></div>
            </div>

        </main>
    </div>

    <div id="admin-modal" class="modal-overlay">
        <div class="modal">
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>
    <div id="admin-toast-container" class="toast-container" aria-live="polite"></div>
    <script src="js/admin.js"></script>
</body>

</html>
